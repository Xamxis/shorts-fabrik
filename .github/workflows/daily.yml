
name: Daily Shorts Factory
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    - cron: '50 11 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v5
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y ffmpeg
          python -m pip install --upgrade pip
          pip install gtts requests
      - name: Generate Video
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          MAKE_WEBHOOK_URL: ${{ secrets.MAKE_WEBHOOK_URL }}
        run: |
          python << 'EOF'
          import requests, random, os, json, subprocess
          from gtts import gTTS
          
          try:
              print("1. Hole Reddit Post...")
              subs = ['Austria','de','FragReddit','todayilearned']
              sub = random.choice(subs)
              headers = {'User-agent':'Mozilla/5.0 (GitHub Actions; +https://github.com/your-repo)'}
              r = requests.get(f'https://www.reddit.com/r/{sub}/top.json?limit=10&t=day', headers=headers)
              r.raise_for_status()
              
              data = r.json()
              posts = [p['data'] for p in data['data']['children'] if not p['data']['stickied'] and len(p['data']['title']) > 20]
              if not posts:
                  raise Exception(f"No valid posts found in r/{sub}")
                  
              post = random.choice(posts)
              reddit_title = post['title']
              print(f"Gewählt: {reddit_title}")
          except Exception as e:
              print(f"FEHLER: {e}")
              reddit_title = "10 interessante Fakten über Österreich"
              print(f"Fallsback auf: {reddit_title}")
          
          try:
              print("2. Lasse Groq Script schreiben...")
              groq_res = requests.post('https://api.groq.com/openai/v1/chat/completions',
                  headers={'Authorization': f"Bearer {os.getenv('GROQ_API_KEY')}", 'Content-Type': 'application/json'},
                  json={
                      "model": "llama3-8b-8192",
                      "messages": [{"role":"user","content": f"""
                      Du bist ein YouTube Shorts Autor. Mach aus diesem Thema ein 38-Sekunden Video-Script auf Deutsch.
                      Thema: {reddit_title}
                      Regeln: Hook in den ersten 2 Sekunden. 3 kurze Punkte. Ende mit 'Folg mir für Teil 2'.
                      Antworte NUR mit JSON: {{"script":"...","videotitle":"...","tags":"..."}}
                      """}],
                      "temperature": 0.8, "response_format": {"type": "json_object"}
                  })
              groq_res.raise_for_status()
              ai_data = groq_res.json()
              if 'choices' not in ai_data or not ai_data['choices']:
                  raise Exception("Groq API gab keine Antwort")
                  
              ai_content = json.loads(ai_data['choices'][0]['message']['content'])
              script = ai_content['script']
              videotitle = ai_content['videotitle']
              tags = ai_content['tags']
              print(f"Script fertig: {videotitle}")
          except Exception as e:
              print(f"Groq FEHLER: {e}")
              script = "Hier ist ein Ersatz-Script..."
              videotitle = "Österreich Fakten"
              tags = "österreich,fakten"
              print(f"Fallsback Script: {videotitle}")
          
          print("3. Erstelle Voice...")
          tts = gTTS(text=script, lang='de', slow=False)
          tts.save('voice.mp3')
          
          print("4. Lade Hintergrundvideo von Pixabay...")
          query = random.choice(['city','nature','abstract','technology','space'])
          pixabay_res = requests.get('https://pixabay.com/api/videos/',
              params={
                  'key': os.getenv('PIXABAY_API_KEY'),
                  'q': query,
                  'video_type': 'film',
                  'min_width': 1080,
                  'min_height': 1920,
                  'per_page': 20
              }).json()
          
          if pixabay_res['totalHits'] == 0:
              raise Exception("Pixabay fand kein Video. Check API Key.")
          
          video_url = random.choice(pixabay_res['hits'])['videos']['medium']['url']
          subprocess.run(['wget', '-O', 'bg.mp4', video_url])
          
          print("5. Erstelle Untertitel...")
          words = script.split()
          duration = 38.0
          srt_content = ""
          time_per_word = duration / len(words)
          for i, word in enumerate(words):
              start = i * time_per_word
              end = (i+1) * time_per_word
              srt_content += f"{i+1}\n00:00:{start:06.3f} --> 00:00:{end:06.3f}\n{word.upper()}\n\n"
          with open('caps.srt', 'w', encoding='utf-8') as f: f.write(srt_content)
          
          print("6. Baue finales Video mit FFmpeg...")
          ffmpeg_cmd = [
              'ffmpeg', '-i', 'bg.mp4', '-i', 'voice.mp3', '-y',
              '-vf', "scale=1080:1920:force_original_aspect_ratio=increase,crop=1080:1920,subtitles=caps.srt:force_style='Alignment=2,FontSize=22,PrimaryColour=&HFFFFFF,OutlineColour=&H000000,BorderStyle=3,Outline=2'",
              '-c:v', 'libx264', '-preset', 'fast', '-c:a', 'aac', '-shortest', 'output.mp4'
          ]
          subprocess.run(ffmpeg_cmd)
          
          print("7. Speichere Meta-Daten...")
          with open('meta.txt', 'w', encoding='utf-8') as f:
              f.write(f"{videotitle}\n{tags}\nBasierend auf r/{sub}: {reddit_title}")
          
          print("8. Lade zu Make.com hoch...")
          with open('output.mp4', 'rb') as f:
              response = requests.post(
                  os.getenv('MAKE_WEBHOOK_URL'),
                  files={'file': ('output.mp4', f, 'video/mp4')}
              )
              if response.status_code == 200:
                  print("Video erfolgreich hochgeladen!")
              else:
                  print(f"Upload fehlgeschlagen: {response.text}")
          print("FERTIG!")
          EOF
      - name: Notify Success
        run: echo "Video generiert und hochgeladen!"
